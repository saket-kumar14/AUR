name: Backend CI

on:
  push:
    branches:
      - main
      - chandrika-devops
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: university_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d university_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/university_db
      REDIS_URL: redis://localhost:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Database Migrations
        run: |
          alembic upgrade head

      - name: Run Tests
        run: |
          pytest